<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanyard Badge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geologica:wght@600;800&display=swap" rel="stylesheet">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #f0ede8;
        min-height: 100vh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
    }

    /* ─── LANYARD ───────────────────────────────── */
    #lanyard-scene {
        position: relative;
        width: 380px;
        height: 640px;
        pointer-events: none;
    }
    #lanyard-rope-svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
        pointer-events: none;
    }
    #lanyard-card {
        position: absolute;
        width: 308px;
        height: 428px;
        background: #1a1717;
        border-radius: 24px;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 36px 28px 32px;
        box-sizing: border-box;
        box-shadow: 0 32px 80px rgba(0,0,0,0.32), 0 8px 24px rgba(0,0,0,0.2);
        pointer-events: auto;
        cursor: grab;
        user-select: none;
        transform-origin: 50% 0%;
        color: #f7f5f2;
        will-change: transform;
    }
    #lanyard-card:active { cursor: grabbing; }
    .lc-clip {
        width: 44px;
        height: 32px;
        background: linear-gradient(180deg,#999 0%,#777 100%);
        border-radius: 8px 8px 0 0;
        margin-bottom: 24px;
        flex-shrink: 0;
        position: relative;
    }
    .lc-clip::after {
        content: '';
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%,-50%);
        width: 14px;
        height: 14px;
        background: #555;
        border-radius: 50%;
    }
    .lc-initials {
        font-family: 'Geologica', sans-serif;
        font-weight: 800;
        font-size: 88px;
        letter-spacing: -0.04em;
        line-height: 1;
        color: #f7f5f2;
        margin-bottom: 20px;
    }
    .lc-divider {
        width: 100%;
        height: 1px;
        background: rgba(247,245,242,0.12);
        margin-bottom: 18px;
    }
    .lc-name {
        font-family: 'Geologica', sans-serif;
        font-weight: 600;
        font-size: 20px;
        letter-spacing: 0.01em;
        color: #f7f5f2;
        margin-bottom: 8px;
    }
    .lc-role {
        font-size: 13px;
        color: rgba(247,245,242,0.5);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        margin-bottom: auto;
    }
    .lc-domain {
        font-size: 12px;
        color: rgba(247,245,242,0.35);
        letter-spacing: 0.08em;
        margin-top: 16px;
    }
</style>
</head>
<body>

<div id="lanyard-scene">
    <svg id="lanyard-rope-svg">
        <path id="rope-shadow" stroke="#c8c3bc" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <path id="rope-path"   stroke="#d6d1ca" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div id="lanyard-card">
        <div class="lc-clip"></div>
        <div class="lc-initials">EK</div>
        <div class="lc-divider"></div>
        <div class="lc-name">Egor Krasnov</div>
        <div class="lc-role">Product Designer</div>
        <div class="lc-domain">krasnov.digital</div>
    </div>
</div>

<script>
(function () {
    var scene    = document.getElementById('lanyard-scene');
    var card     = document.getElementById('lanyard-card');
    var ropeEl   = document.getElementById('rope-path');
    var ropeShEl = document.getElementById('rope-shadow');
    if (!scene || !card) return;

    var CARD_W  = 308;
    var SEGS    = 6;    /* rope segments                          */
    var SEG_LEN = 26;   /* px per segment → total rope ≈ 156 px  */
    var DAMP    = 0.88; /* heavy damping — matches linearDamping:4 in reference */
    var GRAV    = 0.55;
    var ITER    = 30;

    var ax = scene.offsetWidth / 2 || 190;

    /* ── rope nodes (anchor → rope_end) ── */
    function mkNode(x, y, pinned) {
        return { x: x, y: y, px: x, py: y, pinned: !!pinned };
    }
    var R = [];
    for (var i = 0; i <= SEGS; i++) R.push(mkNode(ax, i * SEG_LEN, i === 0));

    /* ── card body — separate from rope, connected via constraint ── */
    var cx  = ax;               /* card top-centre x */
    var cy  = SEGS * SEG_LEN;  /* card top y        */
    var cvx = 0, cvy = 0;      /* card velocity     */

    /* ── drag (delta-based — immune to CSS transform offset) ── */
    var dragging  = false;
    var prevMX = 0, prevMY = 0;

    card.addEventListener('pointerdown', function (e) {
        e.preventDefault();
        card.setPointerCapture(e.pointerId);
        prevMX = e.clientX;
        prevMY = e.clientY;
        cvx = 0; cvy = 0;
        dragging = true;
        card.style.cursor = 'grabbing';
    });
    window.addEventListener('pointermove', function (e) {
        if (!dragging) return;
        var dx = e.clientX - prevMX;
        var dy = e.clientY - prevMY;
        prevMX = e.clientX;
        prevMY = e.clientY;
        cvx = dx; cvy = dy;   /* store for throw on release */
        cx += dx; cy += dy;
    });
    window.addEventListener('pointerup', function () {
        dragging = false;
        card.style.cursor = 'grab';
    });
    window.addEventListener('pointercancel', function () {
        dragging = false;
        card.style.cursor = 'grab';
    });

    /* ── physics step ── */
    var rotYSmooth = 0;

    function step() {
        /* card dynamics when free */
        if (!dragging) {
            cvx *= DAMP;
            cvy  = cvy * DAMP + GRAV;
            cx  += cvx;
            cy  += cvy;
        }

        /* rope Verlet integration */
        for (var i = 1; i < R.length; i++) {
            var n = R[i];
            var vx = (n.x - n.px) * DAMP;
            var vy = (n.y - n.py) * DAMP;
            n.px = n.x; n.py = n.y;
            n.x += vx;
            n.y += vy + GRAV;
        }

        /* constraint iterations */
        for (var k = 0; k < ITER; k++) {
            /* rope distance constraints */
            for (var i = 0; i < R.length - 1; i++) {
                var a = R[i], b = R[i + 1];
                var dx = b.x - a.x, dy = b.y - a.y;
                var d   = Math.sqrt(dx * dx + dy * dy) || 0.001;
                var err = (d - SEG_LEN) / d;
                if (a.pinned) {
                    b.x -= dx * err;
                    b.y -= dy * err;
                } else {
                    a.x += dx * err * 0.5; a.y += dy * err * 0.5;
                    b.x -= dx * err * 0.5; b.y -= dy * err * 0.5;
                }
            }

            /* rope_end ↔ card-top attachment constraint */
            var rl = R[R.length - 1];
            var dx = cx - rl.x, dy = cy - rl.y;
            var d  = Math.sqrt(dx * dx + dy * dy) || 0.001;
            if (d > 0.5) {
                if (dragging) {
                    /* card is king: rope end chases the card */
                    rl.x += dx * 0.7; rl.y += dy * 0.7;
                } else {
                    /* equal share: rope and card pull each other */
                    rl.x += dx * 0.5; rl.y += dy * 0.5;
                    cx   -= dx * 0.5; cy   -= dy * 0.5;
                }
            }
        }
    }

    /* ── SVG cardinal spline ── */
    function spline(pts) {
        var d = 'M' + pts[0].x.toFixed(1) + ' ' + pts[0].y.toFixed(1);
        for (var i = 0; i < pts.length - 1; i++) {
            var p0 = pts[Math.max(i - 1, 0)];
            var p1 = pts[i], p2 = pts[i + 1];
            var p3 = pts[Math.min(i + 2, pts.length - 1)];
            d += ' C' +
                (p1.x + (p2.x - p0.x) / 6).toFixed(1) + ' ' +
                (p1.y + (p2.y - p0.y) / 6).toFixed(1) + ' ' +
                (p2.x - (p3.x - p1.x) / 6).toFixed(1) + ' ' +
                (p2.y - (p3.y - p1.y) / 6).toFixed(1) + ' ' +
                p2.x.toFixed(1) + ' ' + p2.y.toFixed(1);
        }
        return d;
    }

    /* ── render ── */
    function render() {
        /* rope points: all rope nodes + card top */
        var pts = R.map(function (n) { return { x: n.x, y: n.y }; });
        pts.push({ x: cx, y: cy });

        var svg = spline(pts);
        ropeEl.setAttribute('d', svg);
        ropeShEl.setAttribute('d', svg);

        /* lean: angle of rope's last segment to card */
        var rl = R[R.length - 1];
        var rotZ = Math.atan2(cx - rl.x, Math.max(cy - rl.y, 1)) *
                   (180 / Math.PI) * 0.6;

        /* twist: smoothed horizontal velocity */
        rotYSmooth += (cvx * 4 - rotYSmooth) * 0.12;
        rotYSmooth  = Math.max(-30, Math.min(30, rotYSmooth));

        card.style.left      = (cx - CARD_W / 2).toFixed(1) + 'px';
        card.style.top       = cy.toFixed(1) + 'px';
        card.style.transform = 'perspective(900px) rotateZ(' + rotZ.toFixed(2) +
                               'deg) rotateY(' + rotYSmooth.toFixed(2) + 'deg)';
    }

    function loop() { step(); render(); requestAnimationFrame(loop); }
    requestAnimationFrame(loop);
}());
</script>
</body>
</html>
